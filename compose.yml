services:

  api:
    build: .
    image: sritamnanda57/rag-app:latest
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    image: sritamnanda57/rag-app:latest
    command: streamlit run frontend.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    env_file:
      - .env

  upload:
    image: sritamnanda57/rag-app:latest
    command: streamlit run fileUpload.py --server.address 0.0.0.0 --server.port 8200
    ports:
      - "8200:8200"
    env_file:
      - .env